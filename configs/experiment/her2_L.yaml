# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /callbacks: default
  - override /data: her2
  - override /model: skempi
  - override /trainer: ddp
  - override /logger: csv
  

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

callbacks:
  model_checkpoint:
    save_top_k: 1
    every_n_epochs: 1
    save_last: true
    monitor: "val/mse_loss"
    mode: "min"
  early_stopping:
    monitor: "val/mse_loss"
    mode: "min"

data:
  batch_size: 8
  dataset:
    transform: 
      pretrain: false

model:
  optimizer:
    lr: 1e-4
  net:
    atom_dim: 128
    atom_pair_dim: 16
    token_dim: 768
    token_pair_dim: 128
    N_block_atom: 3
    N_head_atom: 4
    N_block_token: 24
    N_head_token: 16
    dropout: 0.0
  mlp:
    input_dim: 256

trainer:
  min_epochs: 50
  max_epochs: 120
  devices: 1


tags: ["dev"]

task_name: "HER2_L"

seed: 42

ckpt_path: null
