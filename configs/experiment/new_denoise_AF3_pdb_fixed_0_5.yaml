# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /callbacks: default
  - override /data: new_pdb
  - override /model: denoise_fixed
  - override /trainer: ddp
  

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

callbacks:
  model_checkpoint:
    save_top_k: -1
    every_n_train_steps: 2000
    save_last: true
    monitor: "train/denoising loss_step"
    mode: "min"
  early_stopping:
    monitor: "val/loss"
    mode: "min"



data:
  batch_size: 32
  dataset:
    transform:
        truncate_length: 200

model:
  optimizer:
    lr: 1e-4
  net:
    # 12.5M trainable parameters
    atom_dim: 128
    atom_pair_dim: 16
    token_dim: 768
    token_pair_dim: 128
    N_block_atom: 3
    N_head_atom: 4
    N_block_token: 24
    N_head_token: 16
    dropout: 0.0
  loss_type: gaussian
  noise_model:
    P_mean: 0.05
  output_param: v

trainer:
  min_epochs: 500
  max_epochs: 1000
  devices: 4 # 4
  num_nodes: 8
  accumulate_grad_batches: 2
  # gradient_clip_val: 0.5


tags: ["dev"]

task_name: "denoising_AF3"

seed: 42

ckpt_path: null
