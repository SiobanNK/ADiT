_target_: adit.data.protein_datamodule.ProteinDataModule

dataset:
  _target_: adit.data.components.dataset.LBADataset
  path_to_dataset: ${paths.lba_path}
  transform:
    _target_: adit.data.components.feature_transform.LBAFeatureTransform
    unit: nm
    truncate_length: 500
    strip_missing_residues: true
    recenter_and_scale: true
    eps: 1e-8
    pretrain: false
    label_name: neglog_aff
  split_identity_threshold: identity_30 # identity_60

batch_size: 4 # 16 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
generator_seed: 42
train_val_split: [0.95, 0.05]
num_workers: 8
pin_memory: false
shuffle: true



# Dynamic (token/pair-budget) batching -- disabled by default (all null),
# so behaviour is unchanged unless you override these. Activate with e.g.:
#   ++data.max_pair_budget=250000 ++data.length_cache_dir=lengths/<name> \
#   ++trainer.reload_dataloaders_every_n_epochs=1 ++trainer.use_distributed_sampler=False
# See DynamicBatchSampler docstring for why sum_of_squares (not a padded
# batch_size * max_L model) is the right cost model for ADiT's token-level
# attention.
max_pair_budget: null
max_total_atoms: null
max_tokens_per_batch: null
cost_model: sum_of_squares
max_batch_size: 64
length_key: seq_mask
length_cache_dir: lengths/lba_S_identity_30
