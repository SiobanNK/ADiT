_target_: adit.data.protein_datamodule.ProteinDataModule

dataset:
  _target_: adit.data.components.dataset.DavisDataset
  path_to_dataset: ${paths.davis_path}
  transform: 
    _target_: adit.data.components.feature_transform.DavisFeatureTransform
    unit: nm
    truncate_length: 150
    strip_missing_residues: true
    recenter_and_scale: true
    eps: 1e-8
    pretrain: false
    label_name: target
  split_seed: "seed_1"

batch_size: 4 # 16 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
generator_seed: 42
train_val_split: [0.95, 0.05]
num_workers: 8
pin_memory: false
shuffle: true
